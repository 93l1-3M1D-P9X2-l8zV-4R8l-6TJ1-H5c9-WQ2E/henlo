<!DOCTYPE html>
<html>
<body style="background:white;font-family:sans-serif">

<input id="i" style="width:100%;font-size:20px" placeholder="eelslap,slope,drivemad">
<button onclick="build()">load</button>

<div id="l"></div>
<iframe id="f" style="position:fixed;top:0;left:0;width:100%;height:100%;border:0;display:none"></iframe>
<script>
function build(){
l.innerHTML=""
i.value.split(",").forEach(n=>{
n=n.trim()
if(!n)return
let a=document.createElement("a")
a.textContent=n
a.href="#"
a.style.display="block"
a.style.color="blue"
a.onclick=()=>{
f.style.display="block"
f.src="Files/"+n+"/"
}
l.appendChild(a)
})
}
</script>

</body>
</html>
