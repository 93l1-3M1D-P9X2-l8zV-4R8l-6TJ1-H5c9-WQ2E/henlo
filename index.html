<!DOCTYPE html>
<html>
<body style="background:white;font-family:sans-serif">
<input id="s" style="width:100%;font-size:20px" placeholder="search...">
<div id="l"></div>
<script>
const games=["eelslap","WebGL Fluid Simulation","Happy Wheels","Deadly Descent","Geometry Dash","Five Night's At Winston's","Polybranch","Papery Planes","Popcat Classic"].sort((a,b)=>a.localeCompare(b))

const l=document.getElementById("l")
const s=document.getElementById("s")
s.placeholder="search... ("+games.length+" games)"
function openGame(g){
let w=window.open("about:blank")
w.document.write(`
<!DOCTYPE html>
<html>
<body style="margin:0">
<iframe src="Files/${g}/" style="position:fixed;top:0;left:0;width:100%;height:100%;border:0"></iframe>
</body>
</html>
`)
w.document.close()
}
function render(filter=""){
l.innerHTML=""
games
.filter(g=>g.toLowerCase().includes(filter.toLowerCase()))
.forEach(g=>{
let a=document.createElement("a")
a.textContent=g
a.href="#"
a.style.display="block"
a.style.color="blue"
a.onclick=()=>openGame(g)
l.appendChild(a)
})
}
s.oninput=()=>render(s.value)
render()
</script>

</body>
</html>
